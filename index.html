<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معاتيه للغاية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; touch-action: pan-y; overflow: hidden; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* Flash animations */
        @keyframes flashGreen { 0% { background-color: #10b981; } 100% { background-color: transparent; } }
        @keyframes flashRed { 0% { background-color: #ef4444; } 100% { background-color: transparent; } }
        .flash-correct { animation: flashGreen 0.8s ease-out; }
        .flash-pass { animation: flashRed 0.8s ease-out; }

        /* Touch Zones - for manual tapping */
        .touch-zone {
            position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.1; transition: opacity 0.3s;
        }
        .touch-zone:active { opacity: 0.3; }
        .zone-pass { left: 0; background-color: #ef4444; }
        .zone-correct { right: 0; background-color: #10b981; }

        /* Portrait Warning Overlay */
        @media screen and (orientation: portrait) {
            .game-active #portrait-warning { display: flex !important; }
            .game-active #game-ui-content { display: none !important; }
        }
        @media screen and (orientation: landscape) {
            #portrait-warning { display: none !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-gray-900 text-white h-screen w-screen no-select">

    <!-- 1. HOME SCREEN -->
    <div id="home-screen" class="flex flex-col items-center justify-center h-full w-full p-6 transition-all duration-300">
        <h1 class="text-6xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-pink-500 drop-shadow-lg text-center">معاتيه للغاية</h1>
        <p class="text-gray-300 mb-8 text-center text-lg">حط الجوال على جبينك وخلي الشلة تمثّلك!</p>
        
        <div class="w-full max-w-md bg-white/10 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-white/20">
            <h2 class="text-xl font-bold mb-4 border-b border-white/20 pb-2">اختر التصنيف:</h2>
            <div id="categories-container" class="space-y-3 mb-6"></div>

            <button id="ios-permission-btn" class="hidden w-full mb-4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg">
                السماح باستخدام حساس الحركة (للايفون)
            </button>

            <button onclick="prepareGame()" class="w-full bg-gradient-to-r from-green-400 to-emerald-600 hover:from-green-500 hover:to-emerald-700 text-white font-black text-2xl py-4 px-4 rounded-xl transition shadow-[0_0_20px_rgba(16,185,129,0.5)] transform hover:scale-105 active:scale-95">
                ابدأ اللعب!
            </button>
        </div>
    </div>

    <!-- 2. COUNTDOWN SCREEN -->
    <div id="countdown-screen" class="hidden fixed inset-0 flex items-center justify-center h-full w-full bg-indigo-900 z-50">
        <div id="countdown-number" class="text-[15rem] font-black text-white drop-shadow-2xl">3</div>
    </div>

    <!-- 3. GAMEPLAY SCREEN -->
    <div id="game-screen" class="hidden fixed inset-0 flex flex-col items-center justify-center h-full w-full bg-gray-900 z-40 transition-colors duration-200">
        
        <div id="portrait-warning" class="hidden absolute inset-0 bg-indigo-950 z-[100] flex flex-col items-center justify-center text-center p-6">
            <span class="text-8xl mb-6">🔄📱</span>
            <h2 class="text-4xl font-black mb-4 text-yellow-400">لف الجوال بالعرض!</h2>
        </div>

        <div id="game-ui-content" class="h-full w-full flex flex-col items-center justify-center relative">
            <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center bg-black/30 z-20 backdrop-blur-sm border-b border-white/10">
                <div class="text-2xl font-bold text-gray-300">الوقت: <span id="timer-display" class="text-white">60</span></div>
                <div class="text-sm font-bold text-gray-400 bg-black/50 px-3 py-1 rounded-full hidden sm:block">نزل راسك = صح | ارفع راسك = تخطي</div>
                <div onclick="endGameEarly()" class="text-xl font-bold text-red-400 bg-red-400/20 px-4 py-1 rounded-full cursor-pointer hover:bg-red-400/40">إنهاء</div>
            </div>

            <!-- Touch fallbacks just in case -->
            <div class="touch-zone zone-pass" onclick="handleAnswer(false)">
                <span class="transform -rotate-90 text-4xl font-black text-white/50">تخطي (نقر)</span>
            </div>
            <div class="touch-zone zone-correct" onclick="handleAnswer(true)">
                <span class="transform -rotate-90 text-4xl font-black text-white/50">صح (نقر)</span>
            </div>

            <div class="z-20 text-center px-10 pointer-events-none w-full">
                <h1 id="current-word" class="text-[5vw] sm:text-[6rem] leading-none font-black text-white drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] text-center break-words">
                    الكلمة
                </h1>
            </div>
        </div>
    </div>

    <!-- 4. RESULTS SCREEN -->
    <div id="results-screen" class="hidden fixed inset-0 flex flex-col items-center justify-start h-full w-full bg-gradient-to-br from-gray-900 to-indigo-900 z-50 p-6 overflow-y-auto">
        <h2 class="text-5xl font-black mb-2 mt-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">انتهى الوقت!</h2>
        <div class="text-3xl font-bold mb-8 text-white">النتيجة: <span id="final-score" class="text-green-400 text-5xl">0</span></div>
        
        <div class="w-full max-w-2xl grid grid-cols-2 gap-4 mb-8">
            <div class="bg-green-900/30 border border-green-500/30 rounded-xl p-4">
                <h3 class="text-xl font-bold text-green-400 border-b border-green-500/30 pb-2 mb-3 text-center">صحيحة ✅</h3>
                <ul id="list-correct" class="space-y-1 text-lg text-center"></ul>
            </div>
            <div class="bg-red-900/30 border border-red-500/30 rounded-xl p-4">
                <h3 class="text-xl font-bold text-red-400 border-b border-red-500/30 pb-2 mb-3 text-center">تخطي ❌</h3>
                <ul id="list-pass" class="space-y-1 text-lg text-center text-gray-400"></ul>
            </div>
        </div>

        <button onclick="resetToHome()" class="w-full max-w-md bg-indigo-500 hover:bg-indigo-600 text-white font-bold text-2xl py-4 rounded-xl shadow-lg transition mb-8">
            العب مرة تانية
        </button>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- 1. AUDIO SYSTEM ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'pass') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'end') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        // --- 2. GAME DATA ---
        const dictionary = {
           "الجيم": [
        "دمبل", "سكوات", "بنش برس", "ديدليفت", "كارديو", "تريدميل", "بروتين", "كرياتين", "شوفان", 
        "عضلة الباي", "عضلة التراي", "عضلة الصدر", "يوم الرجلين", "مدرب"
    ],
    "مكس عام": [
        "موبايل", "شاورما", "متة", "سيارة", "طيارة", "جواز سفر", "بيتزا", "نظارات شمسية", "عطر", 
        "مراية", "مكياج", "سشوار", "بلايستيشن", "انستغرام", "كاميرا", "سماعات", "مطعم", "مسبح", 
        "جاكيت", "بنطلون جينز", "مفاتيح", "جزدان", "خاتم", "هدية", "عيد ميلاد", "عرس", "جامعة", 
        "فحص (امتحان)", "تيك توك", "نتفليكس", "بوشار", "شوكولا", "بوظة", "براد", "مكيف", "بسكليت", 
        "تكسي", "إنترنت", "شاحن", "راوتر", "لابتوب", "شمسية", "ساعة يد", "بنك", "سينما", "قهوة", 
        "أرجيلة", "ورق شدة", "طاولة زهر", "مكنسة", "غسالة", "مكواة", "طنجرة ضغط", "كاسة", "صحن", 
        "شوكة", "معلقة", "سكين", "كنباية", "سجادة", "مخدة", "حرام (بطانية)", "تخت (سرير)", "منشفة", 
        "صابونة", "شامبو", "معجون أسنان", "فرشاة أسنان", "شاي", "عصير", "حليب", "تفاح", "موزة", 
        "برتقال", "عنب", "بطاطا مقلية", "بندورة", "خيار", "جزر", "زيتون", "جبنة", "زعتر", "خبز", 
        "رز", "مدرسة", "مستشفى", "حديقة", "دكانة", "صيدلية", "فندق", "ملعب", "جبل", "غابة", 
        "صحراء", "جزيرة", "قصر", "حب (رومانسية)", "برد (سقعة)", "شوب (حر)", "مطر", "خاتم خطوبة", 
        "فستان سهرة", "كعب عالي", "كرافة (ربطة عنق)", "شال", "طاقية", "كفوف (قفازات)", "جرابات (جوارب)", 
        "كيك (كاتو)", "شموع", "بالون", "ألعاب نارية", "مسدس", "سيف", "قنبلة", "راديو", "تلفزيون", 
        "ريموت كونترول", "جريدة", "مجلة", "رسالة", "إبرة وخيط", "مفتاح سيارة", "إشارة مرور", 
        "مطب بالشارع", "قمر", "شمس", "بحر", "ثلج", "عاصفة", "خيمة", "نار", "بطيخ", "فريز (فراولة)", 
        "ليمون حامض", "فليفلة حادة (شطة)", "بصل", "شجرة", "وردة", "عسل", "ببجي", "يوتيوب", "برجر"
    ],
    "أفعال للتمثيل": [
        "يسبح", "يرقص", "يبكي", "يضحك", "يغني", "يسوق سيارة", "يتصور سيلفي", "يعزف جيتار", "يطبخ", 
        "يلعب رياضة", "ينام (ينعس)", "يتثاءب", "يعطس", "يسعل (يقح)", "يغمز", "يتخانق (يضرب)", 
        "يطير", "يركض", "يتزحلق", "يرتجف (بردان)", "يلعب بلايستيشن", "يأكل شاورما", "يشرب قهوة", "يقرأ كتاب"
    ],
    "شخصيات وحيوانات": [
        "دكتور", "بطريق", "قرد", "ديناصور", "زرافة", "تمساح", "نعامة", "كنغر", "سلحفاة", "أخطبوط", 
        "ناموسة (بعوضة)", "شبح", "زومبي", "كائن فضائي", "ساحر", "بطل خارق (سوبرمان)", "حرامي", 
        "شرطي", "طباخ", "حلاق", "دكتور أسنان", "طيار", "محامي", "مذيع", "مصور", "خباز", "نجار", 
        "كلب", "قطة (بسة)", "عصفور", "أسد", "دُب", "فيل", "حصان", "بقرة", "خروف", "دجاجة", "أرنب", 
        "فار", "حية (أفعى)"
    ]        };

        let currentDeck = [], score = 0, correctList = [], passList = [], timeLeft = 60, timerInterval = null, isPlaying = false, tiltCooldown = false, wakeLock = null;

        const DOM = {
            categories: document.getElementById('categories-container'),
            home: document.getElementById('home-screen'),
            countdown: document.getElementById('countdown-screen'),
            countdownNum: document.getElementById('countdown-number'),
            game: document.getElementById('game-screen'),
            word: document.getElementById('current-word'),
            timer: document.getElementById('timer-display'),
            results: document.getElementById('results-screen'),
            finalScore: document.getElementById('final-score'),
            listCorrect: document.getElementById('list-correct'),
            listPass: document.getElementById('list-pass'),
            iosBtn: document.getElementById('ios-permission-btn')
        };

        function init() { renderCategories(); checkSensors(); }

        function renderCategories() {
            DOM.categories.innerHTML = '';
            Object.keys(dictionary).forEach((cat, index) => {
                const isChecked = index === 0 ? 'checked' : '';
                const html = `<label class="flex items-center space-x-3 space-x-reverse cursor-pointer p-3 rounded-lg border border-gray-200 hover:bg-gray-50 transition text-gray-800"><input type="radio" name="category" value="${cat}" class="form-radio h-5 w-5 text-indigo-600" ${isChecked}><span class="text-lg font-bold">${cat} <span class="text-sm font-normal text-gray-500">(${dictionary[cat].length})</span></span></label>`;
                DOM.categories.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- 3. SENSORS (GRAVITY BASED) ---
        function checkSensors() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DOM.iosBtn.classList.remove('hidden');
                DOM.iosBtn.onclick = async () => {
                    try {
                        const perm = await DeviceMotionEvent.requestPermission();
                        if (perm === 'granted') {
                            window.addEventListener('devicemotion', handleGravityMotion);
                            DOM.iosBtn.classList.add('hidden');
                        }
                    } catch (e) { console.error(e); }
                };
            } else {
                window.addEventListener('devicemotion', handleGravityMotion);
            }
        }

        function handleGravityMotion(event) {
            if (!isPlaying || tiltCooldown) return;

            // Using gravity on the Z-axis (out of the screen)
            // Flat vertical: z is ~ 0
            // Screen facing floor: z approaches -9.8
            // Screen facing ceiling: z approaches +9.8
            const z = event.accelerationIncludingGravity?.z;
            if (z === null || z === undefined) return;

            if (z < -5.5) {
                // Tilted Down (Floor) -> Correct
                handleAnswer(true);
            } else if (z > 5.5) {
                // Tilted Up (Ceiling) -> Pass
                handleAnswer(false);
            }
        }

        // --- 4. GAME FLOW ---
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }
        function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

        function forceLandscape() {
            try {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e=>{});
                    }).catch(e=>{});
                }
            } catch (err) {}
        }

        function prepareGame() {
            initAudio(); // Must initialize audio on click
            
            const selectedCat = document.querySelector('input[name="category"]:checked').value;
            currentDeck = shuffle([...dictionary[selectedCat]]);
            
            score = 0; correctList = []; passList = []; timeLeft = 60;
            
            DOM.home.classList.add('hidden');
            DOM.countdown.classList.remove('hidden');
            
            document.body.classList.add('game-active'); 
            requestWakeLock();
            forceLandscape();
            
            let count = 3;
            DOM.countdownNum.innerText = count;
            const countInterval = setInterval(() => {
                count--;
                if(count > 0) { 
                    DOM.countdownNum.innerText = count; 
                    playSound('correct'); // Ticking sound
                } else if (count === 0) { 
                    DOM.countdownNum.innerText = "انطلق!"; 
                } else {
                    clearInterval(countInterval);
                    DOM.countdown.classList.add('hidden');
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            DOM.game.classList.remove('hidden');
            isPlaying = true;
            DOM.timer.innerText = timeLeft;
            showNextWord();

            timerInterval = setInterval(() => {
                timeLeft--;
                DOM.timer.innerText = timeLeft;
                if(timeLeft <= 10) DOM.timer.classList.add('text-red-500');
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function showNextWord() {
            if (currentDeck.length === 0) return endGame();
            DOM.word.innerText = currentDeck.pop();
        }

        function handleAnswer(isCorrect) {
            if (!isPlaying || tiltCooldown) return;
            
            // Cooldown prevents double-triggering
            tiltCooldown = true; 
            setTimeout(() => { tiltCooldown = false; }, 1200);

            const currentWordText = DOM.word.innerText;
            DOM.game.classList.remove('flash-correct', 'flash-pass');
            void DOM.game.offsetWidth; // trigger reflow

            if (isCorrect) {
                playSound('correct');
                score++; correctList.push(currentWordText);
                DOM.game.classList.add('flash-correct');
            } else {
                playSound('pass');
                passList.push(currentWordText);
                DOM.game.classList.add('flash-pass');
            }
            showNextWord();
        }

        function endGameEarly() { if(confirm('متأكد بدك تنهي اللعبة؟')) endGame(); }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            releaseWakeLock();
            playSound('end');
            document.body.classList.remove('game-active');
            
            try { if (document.exitFullscreen) document.exitFullscreen(); } catch(e){}
            
            DOM.game.classList.add('hidden');
            DOM.timer.classList.remove('text-red-500');
            
            DOM.finalScore.innerText = score;
            DOM.listCorrect.innerHTML = correctList.map(w => `<li>${w}</li>`).join('') || '<li>لا يوجد</li>';
            DOM.listPass.innerHTML = passList.map(w => `<li>${w}</li>`).join('') || '<li>لا يوجد</li>';
            
            DOM.results.classList.remove('hidden');
        }

        function resetToHome() {
            DOM.results.classList.add('hidden');
            DOM.home.classList.remove('hidden');
            renderCategories(); 
        }

        init();
    </script>
</body>
</html>
